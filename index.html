<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CyberPass Analyzer</title>

    <!-- <link rel="stylesheet" href="style.css"> -->

    <link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div class="container">

        <h1>CyberPass Analyzer</h1>
<p class="subtitle">Secure Password Evaluation Tool</p>

        <!-- <input
            type="password"
            id="password"
            placeholder="Enter your password"
            onkeyup="checkPassword()"> -->

     <div class="input-box">

<input
    type="password"
    id="password"
    placeholder="Enter your password"
    onkeyup="checkPassword()">

<!-- <button onclick="togglePassword()">

👁️

</button> -->

<button onclick="togglePassword()" id="toggleBtn">

<i class="fa-solid fa-eye"></i>

</button>

</div>

<button id="generateBtn" onclick="generatePassword()">
    🔑 Generate Strong Password
</button>

<button id="copyBtn" onclick="copyPassword()">

📋 Copy Password

</button>

        <!-- <h2 id="strength">Strength :</h2> -->

        <h2>Password Strength</h2>
<p id="strength">Enter a password to begin analysis.</p>

        <h3 id="entropy">Entropy: 0 bits</h3>

<!-- <h3 id="crackTime">Estimated Crack Time : --</h3> -->

        <div class="progress">

            <div id="bar"></div>

        </div>

        <div class="rules">

            <p id="length">❌ Minimum 8 Characters</p>

            <p id="upper">❌ Uppercase Letter</p>

            <p id="lower">❌ Lowercase Letter</p>

            <p id="number">❌ Number</p>

            <p id="special">❌ Special Character</p>

        </div>

        <footer>

Designed & Developed by <strong>Harshali Sirsat</strong>

</footer>

    </div>

<script src="script.js"></script>



</body>
</html>
